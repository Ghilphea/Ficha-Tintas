<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Ficha RPG</title>

<style>

body{
background:#222;
display:flex;
flex-direction:column;
align-items:center;
font-family:serif;
margin:0;
}

.pagina{
position:relative;
width:2000px;
height:2572px;
margin:40px;
}

.pagina img{
position:absolute;
top:0;
left:0;
width:2000px;
height:2572px;
}

/* CAMPOS ALINHADOS COM LINHAS */

.campo{
position:absolute;
background:transparent;
border:none;
outline:none;
font-size:40px;
font-family:serif;
height:55px;
line-height:55px;
z-index:10;
padding-left:10px;
}

textarea{
resize:none;
border:none;
outline:none;
font-size:40px;
line-height:55px;
padding:10px;
}

/* PAGINA 1 */

.nome{top:455px;left:360px;width:700px;}
.origem{top:545px;left:360px;width:700px;}

.vidaMax{top:455px;left:1200px;width:200px;}
.vidaAtual{top:545px;left:1200px;width:200px;}

.impulsoAtual{top:735px;left:950px;width:200px;}

.estado{top:845px;left:520px;width:1050px;}

.forca{top:1040px;left:360px;width:250px;}
.agilidade{top:1115px;left:360px;width:250px;}
.tecnica{top:1190px;left:360px;width:250px;}
.percepcao{top:1265px;left:360px;width:250px;}
.presenca{top:1340px;left:360px;width:250px;}
.intelecto{top:1415px;left:360px;width:250px;}
.vigor{top:1490px;left:360px;width:250px;}

.energiaMax{top:1040px;left:1200px;width:200px;}
.energiaAtual{top:1115px;left:1200px;width:200px;}

/* PAGINA 3 */

.simples{top:470px;left:200px;width:1600px;height:260px;}
.complexos{top:860px;left:200px;width:1600px;height:260px;}
.avancados{top:1240px;left:200px;width:1600px;height:350px;}

/* PAGINA 4 */

.armaPrincipal{top:430px;left:760px;width:900px;}
.armaSecundaria{top:540px;left:760px;width:900px;}

.protecao{top:740px;left:200px;width:1600px;height:240px;}

.itemImportante{top:1060px;left:200px;width:1600px;height:600px;}

/* PAGINA 5 */

.magia1{top:480px;left:200px;width:1600px;height:200px;}
.magia2{top:730px;left:200px;width:1600px;height:200px;}
.magia3{top:980px;left:200px;width:1600px;height:200px;}
.magia4{top:1230px;left:200px;width:1600px;height:200px;}

</style>
</head>

<body>

<div class="pagina">
<img src="pagina1.png">

<input class="campo nome">
<input class="campo origem">

<input class="campo vidaMax">
<input class="campo vidaAtual">

<input class="campo impulsoAtual">

<input class="campo estado">

<input class="campo forca">
<input class="campo agilidade">
<input class="campo tecnica">
<input class="campo percepcao">
<input class="campo presenca">
<input class="campo intelecto">
<input class="campo vigor">

<input class="campo energiaMax">
<input class="campo energiaAtual">

</div>

<div class="pagina">
<img src="pagina2.png">
</div>

<div class="pagina">
<img src="pagina3.png">

<textarea class="campo simples"></textarea>
<textarea class="campo complexos"></textarea>
<textarea class="campo avancados"></textarea>

</div>

<div class="pagina">
<img src="pagina4.png">

<input class="campo armaPrincipal">
<input class="campo armaSecundaria">

<textarea class="campo protecao"></textarea>
<textarea class="campo itemImportante"></textarea>

</div>

<div class="pagina">
<img src="pagina5.png">

<textarea class="campo magia1"></textarea>
<textarea class="campo magia2"></textarea>
<textarea class="campo magia3"></textarea>
<textarea class="campo magia4"></textarea>

</div>

<script>

const campos = document.querySelectorAll(".campo")

campos.forEach((campo,i)=>{

let salvo = localStorage.getItem("campo"+i)

if(salvo){
campo.value = salvo
}

campo.addEventListener("input",()=>{
localStorage.setItem("campo"+i,campo.value)
})

})

</script>

</body>
</html>
