<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Ficha RPG</title>

<style>

body{
background:#222;
display:flex;
flex-direction:column;
align-items:center;
font-family:serif;
margin:0;
}

/* página agora escala corretamente */

.pagina{
position:relative;
width:90vw;
max-width:1200px;
aspect-ratio:1240/1754;
margin:40px;
}

.pagina img{
position:absolute;
width:100%;
height:100%;
left:0;
top:0;
}

/* campos */

.campo{
position:absolute;
background:transparent;
border:none;
border-bottom:1px solid rgba(0,0,0,0.6);
font-size:1vw;
font-family:serif;
z-index:2;
}

textarea{
resize:none;
border:1px solid rgba(0,0,0,0.4);
background:transparent;
}

/* POSIÇÕES AGORA EM % PARA ESCALAR */

/* PAGINA 1 */

.nome{top:10%;left:12%;width:20%;}
.origem{top:13%;left:12%;width:20%;}

.vidaMax{top:10%;left:55%;width:6%;}
.vidaAtual{top:13%;left:55%;width:6%;}

.impulsoAtual{top:18%;left:45%;width:6%;}

.estado{top:20%;left:20%;width:50%;}

.forca{top:24%;left:12%;width:8%;}
.agilidade{top:26%;left:12%;width:8%;}
.tecnica{top:28%;left:12%;width:8%;}
.percepcao{top:30%;left:12%;width:8%;}
.presenca{top:32%;left:12%;width:8%;}
.intelecto{top:34%;left:12%;width:8%;}
.vigor{top:36%;left:12%;width:8%;}

.energiaMax{top:24%;left:55%;width:6%;}
.energiaAtual{top:26%;left:55%;width:6%;}

/* PAGINA 3 */

.simples{top:18%;left:8%;width:84%;height:8%;}
.complexos{top:32%;left:8%;width:84%;height:8%;}
.avancados{top:46%;left:8%;width:84%;height:12%;}

/* PAGINA 4 */

.armaPrincipal{top:15%;left:35%;width:40%;}
.armaSecundaria{top:19%;left:35%;width:40%;}

.protecao{top:26%;left:8%;width:84%;height:8%;}

.itemImportante{top:36%;left:8%;width:84%;height:18%;}

/* PAGINA 5 */

.magia1{top:18%;left:8%;width:84%;height:6%;}
.magia2{top:28%;left:8%;width:84%;height:6%;}
.magia3{top:38%;left:8%;width:84%;height:6%;}
.magia4{top:48%;left:8%;width:84%;height:6%;}

</style>
</head>

<body>

<div class="pagina">
<img src="pagina1.png">

<input class="campo nome">
<input class="campo origem">

<input class="campo vidaMax">
<input class="campo vidaAtual">

<input class="campo impulsoAtual">

<input class="campo estado">

<input class="campo forca">
<input class="campo agilidade">
<input class="campo tecnica">
<input class="campo percepcao">
<input class="campo presenca">
<input class="campo intelecto">
<input class="campo vigor">

<input class="campo energiaMax">
<input class="campo energiaAtual">

</div>

<div class="pagina">
<img src="pagina2.png">
</div>

<div class="pagina">
<img src="pagina3.png">

<textarea class="campo simples"></textarea>
<textarea class="campo complexos"></textarea>
<textarea class="campo avancados"></textarea>

</div>

<div class="pagina">
<img src="pagina4.png">

<input class="campo armaPrincipal">
<input class="campo armaSecundaria">

<textarea class="campo protecao"></textarea>
<textarea class="campo itemImportante"></textarea>

</div>

<div class="pagina">
<img src="pagina5.png">

<textarea class="campo magia1"></textarea>
<textarea class="campo magia2"></textarea>
<textarea class="campo magia3"></textarea>
<textarea class="campo magia4"></textarea>

</div>

<script>

const campos = document.querySelectorAll(".campo")

campos.forEach((campo,i)=>{

let salvo = localStorage.getItem("campo"+i)

if(salvo){
campo.value = salvo
}

campo.addEventListener("input",()=>{
localStorage.setItem("campo"+i,campo.value)
})

})

</script>

</body>
</html>
