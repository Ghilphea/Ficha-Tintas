<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Ficha RPG</title>

<style>

body{
background:#222;
display:flex;
flex-direction:column;
align-items:center;
font-family:serif;
}

.pagina{
position:relative;
width:800px;
margin:40px;
}

.pagina img{
width:100%;
display:block;
}

.campo{
position:absolute;
background:transparent;
border:none;
border-bottom:1px solid rgba(0,0,0,0.5);
font-size:16px;
font-family:serif;
}

textarea{
resize:none;
border:1px solid rgba(0,0,0,0.3);
background:transparent;
}

/* PAGINA 1 */

.nome{top:190px;left:150px;width:250px;}
.origem{top:230px;left:150px;width:250px;}

.vidaMax{top:190px;left:470px;width:80px;}
.vidaAtual{top:230px;left:470px;width:80px;}

.impulsoAtual{top:310px;left:380px;width:80px;}

.estado{top:350px;left:200px;width:450px;}

.forca{top:430px;left:150px;width:100px;}
.agilidade{top:460px;left:150px;width:100px;}
.tecnica{top:490px;left:150px;width:100px;}
.percepcao{top:520px;left:150px;width:100px;}
.presenca{top:550px;left:150px;width:100px;}
.intelecto{top:580px;left:150px;width:100px;}
.vigor{top:610px;left:150px;width:100px;}

.energiaMax{top:430px;left:470px;width:80px;}
.energiaAtual{top:470px;left:470px;width:80px;}

/* PAGINA 3 */

.simples{top:200px;left:80px;width:640px;height:100px;}
.complexos{top:350px;left:80px;width:640px;height:100px;}
.avancados{top:510px;left:80px;width:640px;height:130px;}

/* PAGINA 4 */

.armaPrincipal{top:180px;left:300px;width:350px;}
.armaSecundaria{top:230px;left:300px;width:350px;}

.protecao{top:310px;left:80px;width:640px;height:90px;}

.itemImportante{top:430px;left:80px;width:640px;height:220px;}

/* PAGINA 5 */

.magia1{top:200px;left:80px;width:640px;height:80px;}
.magia2{top:320px;left:80px;width:640px;height:80px;}
.magia3{top:440px;left:80px;width:640px;height:80px;}
.magia4{top:560px;left:80px;width:640px;height:80px;}

</style>
</head>

<body>

<!-- PAGINA 1 -->

<div class="pagina">
<img src="pagina1.png">

<input class="campo nome">
<input class="campo origem">

<input class="campo vidaMax">
<input class="campo vidaAtual">

<input class="campo impulsoAtual">

<input class="campo estado">

<input class="campo forca">
<input class="campo agilidade">
<input class="campo tecnica">
<input class="campo percepcao">
<input class="campo presenca">
<input class="campo intelecto">
<input class="campo vigor">

<input class="campo energiaMax">
<input class="campo energiaAtual">

</div>


<!-- PAGINA 2 -->

<div class="pagina">
<img src="pagina2.png">
</div>


<!-- PAGINA 3 -->

<div class="pagina">
<img src="pagina3.png">

<textarea class="campo simples"></textarea>
<textarea class="campo complexos"></textarea>
<textarea class="campo avancados"></textarea>

</div>


<!-- PAGINA 4 -->

<div class="pagina">
<img src="pagina4.png">

<input class="campo armaPrincipal">
<input class="campo armaSecundaria">

<textarea class="campo protecao"></textarea>
<textarea class="campo itemImportante"></textarea>

</div>


<!-- PAGINA 5 -->

<div class="pagina">
<img src="pagina5.png">

<textarea class="campo magia1"></textarea>
<textarea class="campo magia2"></textarea>
<textarea class="campo magia3"></textarea>
<textarea class="campo magia4"></textarea>

</div>

<script>

const campos = document.querySelectorAll(".campo")

campos.forEach((campo,i)=>{

let salvo = localStorage.getItem("campo"+i)

if(salvo){
campo.value = salvo
}

campo.addEventListener("input",()=>{
localStorage.setItem("campo"+i,campo.value)
})

})

</script>

</body>
</html>
