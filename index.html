<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<title>Ficha RPG</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=IM+Fell+English&display=swap" rel="stylesheet">

<style>

body{
background:#e8d5b7;
font-family:'IM Fell English', serif;
padding:40px;
}

.page{
max-width:900px;
margin:auto;
background:#f5e6c8;
padding:40px;
border:6px solid #5c2f1d;
border-radius:10px;
box-shadow:0 0 20px rgba(0,0,0,0.3);
}

h1{
text-align:center;
font-family:'Cinzel', serif;
font-size:40px;
margin-bottom:30px;
}

h2{
margin-top:40px;
border-bottom:2px solid #5c2f1d;
padding-bottom:5px;
font-family:'Cinzel', serif;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:20px;
}

.skills{
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
}

input, textarea{

width:100%;
padding:6px;
font-family:inherit;
background:#fff8e6;
border:1px solid #8a5a44;
border-radius:4px;

}

textarea{

min-height:70px;

}

label{

font-weight:bold;

}

button{

margin-top:30px;
padding:10px 20px;
font-size:16px;
background:#5c2f1d;
color:white;
border:none;
cursor:pointer;
border-radius:5px;

}

button:hover{

background:#7a3e27;

}

</style>

</head>

<body>

<div class="page">

<h1>SEU LIVRO</h1>

<div class="grid">

<label>Nome</label>
<input id="nome">

<label>Origem</label>
<input id="origem">

<label>Vida Máx</label>
<input id="vidaMax">

<label>Vida Atual</label>
<input id="vidaAtual">

<label>Energia Máx</label>
<input id="energiaMax">

<label>Energia Atual</label>
<input id="energiaAtual">

<label>Impulso Máx</label>
<input id="impulsoMax" value="3">

<label>Impulso Atual</label>
<input id="impulsoAtual">

<label>Estado Atual</label>
<input id="estado">

</div>


<h2>Atributos</h2>

<div class="grid">

<label>Força</label>
<input id="forca">

<label>Agilidade</label>
<input id="agilidade">

<label>Técnica</label>
<input id="tecnica">

<label>Percepção</label>
<input id="percepcao">

<label>Presença</label>
<input id="presenca">

<label>Intelecto</label>
<input id="intelecto">

<label>Vigor</label>
<input id="vigor">

</div>


<h2>Equipamentos</h2>

<label>Arma Principal</label>
<input id="armaPrincipal">

<label>Arma Secundária</label>
<input id="armaSecundaria">

<label>Proteção</label>
<textarea id="protecao"></textarea>

<label>Item Importante</label>
<textarea id="itemImportante"></textarea>


<h2>Magias</h2>

<label>Magia I</label>
<textarea id="magia1"></textarea>

<label>Magia II</label>
<textarea id="magia2"></textarea>

<label>Magia III</label>
<textarea id="magia3"></textarea>

<label>Magia IV</label>
<textarea id="magia4"></textarea>


<h2>Perícias</h2>

<div class="skills">

<div>

<h3>Combate</h3>

<label>Luta</label>
<input id="luta">

<label>Armas Brancas</label>
<input id="armasBrancas">

<label>Armas de Fogo</label>
<input id="armasFogo">

<label>Esquiva</label>
<input id="esquiva">

<label>Acrobacia</label>
<input id="acrobacia">

<label>Controle de Energia</label>
<input id="controleEnergia">

<label>Finalização</label>
<input id="finalizacao">

</div>


<div>

<h3>Social</h3>

<label>Persuasão</label>
<input id="persuasao">

<label>Intimidação</label>
<input id="intimidacao">

<label>Enganação</label>
<input id="enganacao">

<label>Empatia</label>
<input id="empatia">

<label>Performance</label>
<input id="performance">

<label>Negociação</label>
<input id="negociacao">

</div>


<div>

<h3>Conhecimento</h3>

<label>Medicina</label>
<input id="medicina">

<label>Primeiros Socorros</label>
<input id="socorros">

<label>Anatomia</label>
<input id="anatomia">

<label>Alquimia Médica</label>
<input id="alquimia">

</div>


<div>

<h3>Sobrevivência</h3>

<label>Sobrevivência</label>
<input id="sobrevivencia">

<label>Furtividade</label>
<input id="furtividade">

<label>Escalada</label>
<input id="escalada">

<label>Resistência</label>
<input id="resistencia">

<label>Orientação</label>
<input id="orientacao">

</div>

</div>


<h2>Passos Conhecidos</h2>

<label>Passos Simples</label>
<textarea id="passosSimples"></textarea>

<label>Passos Complexos</label>
<textarea id="passosComplexos"></textarea>

<label>Passos Avançados</label>
<textarea id="passosAvancados"></textarea>


<button onclick="resetFicha()">Limpar Ficha</button>

</div>


<script>

const inputs = document.querySelectorAll("input, textarea")

inputs.forEach(input => {

const saved = localStorage.getItem(input.id)

if(saved){
input.value = saved
}

input.addEventListener("input", () => {

localStorage.setItem(input.id, input.value)

})

})

function resetFicha(){

if(confirm("Deseja apagar toda a ficha?")){

localStorage.clear()
location.reload()

}

}

</script>

</body>
</html>
