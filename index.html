<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Ficha RPG</title>

<style>

body{
background:#222;
display:flex;
flex-direction:column;
align-items:center;
font-family:serif;
margin:0;
}

/* TAMANHO REAL DA IMAGEM */

.pagina{
position:relative;
width:2000px;
height:2572px;
margin:40px;
}

/* IMAGEM */

.pagina img{
position:absolute;
top:0;
left:0;
width:2000px;
height:2572px;
}

/* CAMPOS */

.campo{
position:absolute;
background:transparent;
border:none;
border-bottom:2px solid rgba(0,0,0,0.6);
font-size:28px;
font-family:serif;
z-index:10;
}

textarea{
resize:none;
border:2px solid rgba(0,0,0,0.4);
background:transparent;
}

/* PAGINA 1 */

.nome{top:475px;left:375px;width:625px;}
.origem{top:575px;left:375px;width:625px;}

.vidaMax{top:475px;left:1175px;width:200px;}
.vidaAtual{top:575px;left:1175px;width:200px;}

.impulsoAtual{top:775px;left:950px;width:200px;}

.estado{top:875px;left:500px;width:1125px;}

.forca{top:1075px;left:375px;width:250px;}
.agilidade{top:1150px;left:375px;width:250px;}
.tecnica{top:1225px;left:375px;width:250px;}
.percepcao{top:1300px;left:375px;width:250px;}
.presenca{top:1375px;left:375px;width:250px;}
.intelecto{top:1450px;left:375px;width:250px;}
.vigor{top:1525px;left:375px;width:250px;}

.energiaMax{top:1075px;left:1175px;width:200px;}
.energiaAtual{top:1150px;left:1175px;width:200px;}

/* PAGINA 3 */

.simples{top:500px;left:200px;width:1600px;height:250px;}
.complexos{top:875px;left:200px;width:1600px;height:250px;}
.avancados{top:1275px;left:200px;width:1600px;height:325px;}

/* PAGINA 4 */

.armaPrincipal{top:450px;left:750px;width:875px;}
.armaSecundaria{top:575px;left:750px;width:875px;}

.protecao{top:775px;left:200px;width:1600px;height:225px;}

.itemImportante{top:1075px;left:200px;width:1600px;height:550px;}

/* PAGINA 5 */

.magia1{top:500px;left:200px;width:1600px;height:200px;}
.magia2{top:750px;left:200px;width:1600px;height:200px;}
.magia3{top:1000px;left:200px;width:1600px;height:200px;}
.magia4{top:1250px;left:200px;width:1600px;height:200px;}

</style>
</head>

<body>

<div class="pagina">
<img src="pagina1.png">

<input class="campo nome">
<input class="campo origem">

<input class="campo vidaMax">
<input class="campo vidaAtual">

<input class="campo impulsoAtual">

<input class="campo estado">

<input class="campo forca">
<input class="campo agilidade">
<input class="campo tecnica">
<input class="campo percepcao">
<input class="campo presenca">
<input class="campo intelecto">
<input class="campo vigor">

<input class="campo energiaMax">
<input class="campo energiaAtual">

</div>

<div class="pagina">
<img src="pagina2.png">
</div>

<div class="pagina">
<img src="pagina3.png">

<textarea class="campo simples"></textarea>
<textarea class="campo complexos"></textarea>
<textarea class="campo avancados"></textarea>

</div>

<div class="pagina">
<img src="pagina4.png">

<input class="campo armaPrincipal">
<input class="campo armaSecundaria">

<textarea class="campo protecao"></textarea>
<textarea class="campo itemImportante"></textarea>

</div>

<div class="pagina">
<img src="pagina5.png">

<textarea class="campo magia1"></textarea>
<textarea class="campo magia2"></textarea>
<textarea class="campo magia3"></textarea>
<textarea class="campo magia4"></textarea>

</div>

<script>

const campos = document.querySelectorAll(".campo")

campos.forEach((campo,i)=>{

let salvo = localStorage.getItem("campo"+i)

if(salvo){
campo.value = salvo
}

campo.addEventListener("input",()=>{
localStorage.setItem("campo"+i,campo.value)
})

})

</script>

</body>
</html>
